{% extends 'base.html' %}

{% block title %}Login - Veloce{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-4xl font-bold text-center mb-8">LOGIN</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" class="flex flex-col space-y-4">
        {% csrf_token %}
        <input type="text" name="username" class="px-4 py-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Username" required>
        
        <div class="relative">
            <input type="password" name="password" id="password" class="px-4 py-3 border border-gray-300 rounded w-full focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Password" required>
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 focus:outline-none">
                <i class="fas fa-eye" id="eye-icon"></i>
            </button>
        </div>
        
        <button type="submit" class="bg-primary-light hover:bg-primary-dark text-black font-bold py-3 px-4 rounded-full mt-4 transition duration-300">
            LOGIN
        </button>
    </form>
    
    <div class="mt-6 text-center">
        Don't have an account? <a href="{% url 'main:register' %}" class="font-bold text-black">Register here</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
